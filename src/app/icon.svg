<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a0f1a"/>
  <!-- Bold italic OP at ~15deg slant via skewX -->
  <g transform="translate(256, 270) skewX(-15) translate(-240, -260)">
    <!-- O — wide bold shape, bottom extends left for speed feel -->
    <path d="
      M40 300
      C40 200 95 130 185 130
      C270 130 318 200 318 300
      C318 390 270 455 185 455
      C95 455 40 390 40 300
      Z
    " fill="url(#g)"/>
    <!-- O counter — italic oval -->
    <ellipse cx="183" cy="302" rx="55" ry="62" fill="#0a0f1a"/>
    <!-- P — bold, overlapping with O on the right -->
    <path d="
      M250 130
      L370 130
      C440 130 475 170 475 230
      C475 295 440 330 370 330
      L315 330
      L295 455
      L235 455
      Z
    " fill="url(#g)"/>
    <!-- P bowl counter — italic oval -->
    <ellipse cx="375" cy="228" rx="38" ry="40" fill="#0a0f1a"/>
  </g>
</svg>